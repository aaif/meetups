name: validate

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - uses: pre-commit/action@v3.0.1   # runs `pre-commit run --all-files`

  plugin-validate:
    # Anthropic's own validator: marketplace.json + plugin.json schema,
    # duplicate plugin names, source path traversal, and SKILL.md frontmatter.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code
      - name: Validate marketplace and plugin
        run: |
          claude plugin validate .
          claude plugin validate ./plugins/aaif-meetups
